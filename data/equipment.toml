# ====================================================================
# BSARC MASTER CLUB ASSET & INVENTORY DATA SHEET
# ====================================================================
# INSTRUCTIONS FOR CLUB EDITORS AND OFFICERS:
# 
# ?? Formatting Rules Checklist:
#    1. Always Seal Text Values: Text columns MUST be nested inside 
#       double quotation marks: "Value Text"
#    2. Plain Numbers Only: Numerical counts (qty = 1) do NOT use quotes.
#    3. Missing Properties: If unknown, use placeholders: "N/A"
#    4. Dynamic Location Mapping: Use this field to track where an item is stored.
#    5. Operational Notes: Use the 'note = "..."' field to add specific event details.
# 
# ?? Status & Workflow Reference Guide:
#    - "Available"         -> Ready for loan checkouts. [Borrow ???] link active.
#    - "Reserved"          -> Locked for a member booking or upcoming event.
#                             Requires a through-date field entry: reserved_date = "MM/DD/YY"
#    - "Official Use Only" -> Reserved for Field Day or club operations. Blocks borrowing.
#    - "For Sale"          -> Cleared as club surplus. Requires price entry string: price = "$X"
#    - "Checked Out"       -> Currently out on loan to an active member.
#    - "In Use"            -> Permanently deployed (e.g., at repeater sites).
#    - "Donated"           -> Decommissioned or permanently given away.
# ====================================================================

