# ====================================================================
# BSARC MASTER CLUB ASSET & INVENTORY DATA SHEET
# ====================================================================
# INSTRUCTIONS FOR CLUB EDITORS AND OFFICERS:
# 
# 💡 Formatting Rules Checklist:
#    1. Always Seal Text Values: Text columns MUST be nested inside 
#       double quotation marks: "Value Text"
#    2. Plain Numbers Only: Numerical counts (qty = 1) do NOT use quotes.
#    3. Missing Properties: If serial or model entries are unknown, 
#       record them as placeholders: "N/A"
# 
# 📝 Status & Workflow Reference Guide:
#    - "Available"    -> Asset is ready in the closet for loan checkouts.
#                        Generates an automated [Borrow 🏷️] link.
#    - "For Sale"     -> Asset is cleared as club surplus for liquidation.
#                        Requires a valid 'price = "$X"' parameter block.
#                        Generates an automated [Purchase 💰] section.
#    - "Checked Out"  -> Asset is currently on loan to an active member.
#    - "In Use"       -> Asset is permanently deployed (e.g., at a repeater site).
#    - "Donated"      -> Decommissioned or permanently given away.
# ====================================================================

