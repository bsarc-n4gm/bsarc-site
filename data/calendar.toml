# ====================================================================
# OFFICIAL BSARC CLUB CALENDAR DATA SHEET
# ====================================================================
# INSTRUCTIONS FOR EDITORS AND CLUB OFFICERS:
# 
# 💡 General Formatting Rules:
#     - Text values MUST be wrapped in double quotation marks: "text"
#     - The "date" field MUST match standard system syntax format: "YYYY-MM-DD"
#       (e.g., "2026-06-10"). This calculates the rolling 90-day homepage window!
#     - The "display_date" field handles what text shows on screen to users.
#     - The "time" field isolates the event hour cleanly across all page views.
# 
# 🛠️ Priority Link Routing Rules (Automated):
#     - Global Zoom Shield: Set "show_zoom_globally = true" at the top to unlock
#                          all video links instantly on the morning of a meeting.
#                          Set to false to mask URLs with a security reminder.
#     - Event Cancellations: Set "canceled = true" on an item block to throw an
#                            alert crimson visual layout and auto-lock its paths.
#     - On-Air / Net Badges: If the location contains "Air", "Net", or "Conference",
#                            it displays a safe, unclickable gray info panel.
#     - Physical Venues: If it is a real venue street address, it automatically 
#                        formats a blue interactive button routed to Google Maps!
#     - External Web Info: If "link_url" contains a web link, it appends a blue
#                          "🌐 Visit Event Website" shortcut automatically.
#     - Media Flyers: If "flyer_path" targets an asset (e.g., "/library/flyer.pdf"),
#                     it appends an orange "📄 View Event Flyer" button automatically.
# ====================================================================

